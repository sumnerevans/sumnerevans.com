name: "Build and Deploy"

on:
  pull_request:
  push:
  schedule:
    - cron: "0 6 * * *"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - uses: actions/checkout@v7

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Cache HugoMod
        uses: actions/cache@v6
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - run: npm install

      - name: Cache Generated Images
        id: cache-images
        uses: actions/cache@v6
        with:
          path: resources
          key: images-${{ hashFiles('hugo.yaml') }}-${{ hashFiles('themes/**/*') }}-${{ github.run_id }}
          restore-keys: |
            images-${{ hashFiles('hugo.yaml') }}-${{ hashFiles('themes/**/*') }}-
            images-${{ hashFiles('hugo.yaml') }}-
            images-

      - name: Hugo
        run: hugo --logLevel debug --gc --minify

      - name: Search Index
        run: |
          node generate_index.js \
            < public/index.json \
            > public/search-index.json

      - name: Teaching raw HTML
        run: |
          rm -rf public/teaching/csci400-s19
          rm -rf public/teaching/csci564-s21
          cp -r content/teaching/csci400-s19 public/teaching
          cp -r content/teaching/csci564-s21 public/teaching

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v5
